services:
  research:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    working_dir: /workspace
    tty: true
    stdin_open: true
    volumes:
      - ..:/workspace
    environment:
      - PYTHONPATH=/workspace
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
